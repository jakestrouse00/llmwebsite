<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sites</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-border: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.5rem;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .site-card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 18px;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .site-card:hover {
      transform: translateY(-2px);
      border-color: #334155;
    }

    .site-name {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 700;
      word-break: break-word;
    }

    .site-path {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
      word-break: break-word;
    }

    .site-link {
      display: inline-block;
      text-decoration: none;
      color: #0b1220;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
    }

    .site-link:hover {
      background: var(--accent-hover);
    }

    .empty-state,
    .error-state {
      padding: 18px;
      border: 1px solid var(--panel-border);
      background: rgba(17, 24, 39, 0.85);
      border-radius: 16px;
      color: var(--muted);
    }

    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>My Websites</h1>
    <p>
      This page automatically finds folders in this repository that contain an
      <code>index.html</code> file and lists them below.
    </p>

    <div id="status" class="status">Loading websites...</div>
    <div id="sites" class="sites-grid"></div>
  </main>

  <script>
    // Change these if needed.
    const githubOwner = "jakestrouse00";
    const githubRepository = "llmwebsite";
    const githubBranch = "main";

    const statusElement = document.getElementById("status");
    const sitesContainer = document.getElementById("sites");

    function createSiteCard(folderName) {
      const siteUrl = `./${encodeURIComponent(folderName)}/`;

      const cardElement = document.createElement("article");
      cardElement.className = "site-card";

      const titleElement = document.createElement("h2");
      titleElement.className = "site-name";
      titleElement.textContent = folderName;

      const pathElement = document.createElement("p");
      pathElement.className = "site-path";
      pathElement.textContent = `${folderName}/index.html`;

      const linkElement = document.createElement("a");
      linkElement.className = "site-link";
      linkElement.href = siteUrl;
      linkElement.textContent = "Open site";

      cardElement.appendChild(titleElement);
      cardElement.appendChild(pathElement);
      cardElement.appendChild(linkElement);

      return cardElement;
    }

    async function fetchRepositoryRootItems() {
      const apiUrl =
        `https://api.github.com/repos/${githubOwner}/${githubRepository}/contents?ref=${githubBranch}`;

      const response = await fetch(apiUrl);

      if (!response.ok) {
        throw new Error(`Failed to load repo contents (${response.status})`);
      }

      return response.json();
    }

    async function folderContainsIndexHtml(folderName) {
      const apiUrl =
        `https://api.github.com/repos/${githubOwner}/${githubRepository}/contents/${encodeURIComponent(folderName)}?ref=${githubBranch}`;

      const response = await fetch(apiUrl);

      if (!response.ok) {
        return false;
      }

      const folderItems = await response.json();
      return Array.isArray(folderItems) && folderItems.some(
        (item) => item.type === "file" && item.name.toLowerCase() === "index.html"
      );
    }

    async function loadSites() {
      try {
        const rootItems = await fetchRepositoryRootItems();

        const rootFolders = rootItems.filter((item) => item.type === "dir");
        const siteChecks = await Promise.all(
          rootFolders.map(async (folderItem) => ({
            folderName: folderItem.name,
            hasIndexHtml: await folderContainsIndexHtml(folderItem.name),
          }))
        );

        const siteFolders = siteChecks
          .filter((item) => item.hasIndexHtml)
          .map((item) => item.folderName)
          .sort((left, right) => left.localeCompare(right));

        statusElement.textContent = `Found ${siteFolders.length} website${siteFolders.length === 1 ? "" : "s"}.`;

        if (siteFolders.length === 0) {
          sitesContainer.innerHTML = `
            <div class="empty-state">
              No folders with an <code>index.html</code> file were found in the repo root.
            </div>
          `;
          return;
        }

        for (const folderName of siteFolders) {
          sitesContainer.appendChild(createSiteCard(folderName));
        }
      } catch (error) {
        console.error(error);
        statusElement.textContent = "Could not load websites.";

        sitesContainer.innerHTML = `
          <div class="error-state">
            Make sure <code>githubOwner</code>, <code>githubRepository</code>, and
            <code>githubBranch</code> are correct.
          </div>
        `;
      }
    }

    loadSites();
  </script>
</body>
</html>
